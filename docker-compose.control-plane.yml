services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ac-control-api
    environment:
      PORT: 8080
      DATA_DIR: /data
      WEB_ORIGIN: ${WEB_ORIGIN:-*}
      AUTH_ENABLED: ${AUTH_ENABLED:-1}
      CONTROL_PANEL_USERNAME: ${CONTROL_PANEL_USERNAME:-admin}
      CONTROL_PANEL_PASSWORD: ${CONTROL_PANEL_PASSWORD:-change-me-now}
      CONTROL_PANEL_ROLE: ${CONTROL_PANEL_ROLE:-admin}
      CONTROL_PANEL_USERS_JSON: ${CONTROL_PANEL_USERS_JSON:-}
      CONTROL_PANEL_SESSION_SECRET: ${CONTROL_PANEL_SESSION_SECRET:-change-this-secret}
      CONTROL_PANEL_TOKEN_TTL_SEC: ${CONTROL_PANEL_TOKEN_TTL_SEC:-43200}
      CONTROL_PANEL_RATE_LIMIT_RPM: ${CONTROL_PANEL_RATE_LIMIT_RPM:-120}
      ALLOW_CONFIG_WRITE: ${ALLOW_CONFIG_WRITE:-1}
      ACTION_MODE: ${ACTION_MODE:-mock}
      ACTION_TIMEOUT_MS: ${ACTION_TIMEOUT_MS:-20000}
      ACTION_START_CMD: ${ACTION_START_CMD:-}
      ACTION_STOP_CMD: ${ACTION_STOP_CMD:-}
      ACTION_RESTART_CMD: ${ACTION_RESTART_CMD:-}
      ACTION_UPDATE_CMD: ${ACTION_UPDATE_CMD:-}
      ACTION_BACKUP_CMD: ${ACTION_BACKUP_CMD:-}
    volumes:
      - control_plane_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ac-control-web
    depends_on:
      - api
    ports:
      - "${CONTROL_PANEL_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  control_plane_data:
    name: ac-control-plane-data
